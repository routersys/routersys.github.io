name: Update Plugin Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch repositories and topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import subprocess, json
          from datetime import datetime, timezone

          TOPIC_TO_CATEGORY = {
              "ymm4-audio-source":    "音声読み込みプラグイン",
              "ymm4-video-source":    "映像読み込みプラグイン",
              "ymm4-image-source":    "画像読み込みプラグイン",
              "ymm4-tachie":          "立ち絵プラグイン",
              "ymm4-shape":           "図形プラグイン",
              "ymm4-audio-spectrum":  "波形プラグイン",
              "ymm4-video-writer":    "動画出力プラグイン",
              "ymm4-audio-effect":    "音声エフェクト",
              "ymm4-video-effect":    "映像エフェクト",
              "ymm4-voice":           "音声合成プラグイン",
              "ymm4-text-completion": "AIテキスト補完プラグイン",
              "ymm4-transition":      "場面切り替えプラグイン",
          }

          def gh(*args):
              result = subprocess.run(
                  ["gh", "api", "--header", "Accept: application/vnd.github+json"] + list(args),
                  capture_output=True, text=True, check=True
              )
              return json.loads(result.stdout)

          repos_raw = gh("/users/routersys/repos?per_page=100&sort=pushed&type=public")

          repos = []
          for r in repos_raw:
              if not r["name"].startswith("YMM4-"):
                  continue

              topics_data = gh(f"/repos/routersys/{r['name']}/topics")
              raw_topics = topics_data.get("names", [])

              categories = list(dict.fromkeys(
                  TOPIC_TO_CATEGORY[t] for t in raw_topics if t in TOPIC_TO_CATEGORY
              ))

              repos.append({
                  "name": r["name"],
                  "description": r["description"],
                  "language": r["language"],
                  "stargazers_count": r["stargazers_count"],
                  "pushed_at": r["pushed_at"],
                  "categories": categories,
              })

          output = {
              "updated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "repositories": repos,
          }

          with open("plugins/data.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"Fetched {len(repos)} repositories.")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/data.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "データ更新: $(date -u +"%Y-%m-%d")"
            git push
          fi
